server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理到 Auth 后端
    location /api/ {
        proxy_pass http://authapi/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 传递上游代理的原始协议，避免容器内 $scheme 始终为 http 覆盖了宿主机的 https
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # OpenIddict 端点代理
    location /connect/ {
        proxy_pass http://authapi/connect/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

      # 发现端点代理
    location /.well-known/ {
        proxy_pass http://authapi/.well-known/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
