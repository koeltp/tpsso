services:
  # ==================== Auth 认证服务 ====================
  tpssoauth-api:
    image: registry.cn-shenzhen.aliyuncs.com/tmd/sso:tpssoauth-api
    container_name: tpssoauth-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:80
    ports:
      - "7086:80"
    volumes:
      - ./config/tpssoauth-api/appsettings.Production.json:/app/appsettings.Production.json:ro
    networks:
      - tpsso-network

  # ==================== Admin 管理服务 ====================
  tpssoadmin-api:
    image: registry.cn-shenzhen.aliyuncs.com/tmd/sso:tpssoadmin-api
    container_name: tpssoadmin-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:80
    ports:
      - "7089:80"
    volumes:
      - admin_uploads:/app/wwwroot/avatars
      - ./config/tpssoadmin-api/appsettings.Production.json:/app/appsettings.Production.json:ro
    depends_on:
      - tpssoauth-api
    networks:
      - tpsso-network

  # ==================== 认证前端（tpssoauth）====================
  tpssoauth:
    image: registry.cn-shenzhen.aliyuncs.com/tmd/sso:tpssoauth
    container_name: tpssoauth
    restart: unless-stopped
    ports:
      - "7087:80"
    depends_on:
      - tpssoauth-api
    networks:
      - tpsso-network

  # ==================== 管理后台前端（tpssoadmin）====================
  tpssoadmin:
    image: registry.cn-shenzhen.aliyuncs.com/tmd/sso:tpssoadmin
    container_name: tpssoadmin
    restart: unless-stopped
    ports:
      - "7088:80"
    depends_on:
      - tpssoadmin-api
    networks:
      - tpsso-network

# ==================== 数据卷 ====================
volumes:
  admin_uploads:
    driver: local

# ==================== 网络 ====================
networks:
  tpsso-network: