services:
  # ==================== .NET API 后端 ====================
  tpssoapi:
    image: registry.cn-shenzhen.aliyuncs.com/tmd/sso:tpssoapi
    container_name: tpssoapi
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:80
    ports:
      - "7086:80"
    volumes:
      - api_uploads:/app/wwwroot/uploads
      - ./config/tpssoapi/appsettings.Production.json:/app/appsettings.Production.json:ro
    networks:
      - tpsso-network

  # ==================== 用户前端（tpssoweb）====================
  tpssoweb:
    image: registry.cn-shenzhen.aliyuncs.com/tmd/sso:tpssoweb
    container_name: tpssoweb
    restart: unless-stopped
    ports:
      - "7087:80"
    depends_on:
      - tpssoapi
    networks:
      - tpsso-network

  # ==================== 演示客户端（tpsso-app）====================
  tpssoapp:
    image: registry.cn-shenzhen.aliyuncs.com/tmd/sso:tpssoapp
    container_name: tpssoapp
    restart: unless-stopped
    ports:
      - "7085:80"
    depends_on:
      - tpssoapi
    networks:
      - tpsso-network

  # ==================== 管理后台（tpssoadmin）====================
  tpssoadmin:
    image: registry.cn-shenzhen.aliyuncs.com/tmd/sso:tpssoadmin
    container_name: tpssoadmin
    restart: unless-stopped
    ports:
      - "7088:80"
    depends_on:
      - tpssoapi
    networks:
      - tpsso-network

# ==================== 数据卷 ====================
volumes:
  api_uploads:
    driver: local

# ==================== 网络 ====================
networks:
  tpsso-network: